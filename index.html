<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo List</title>
<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    padding: 40px 20px;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", Arial, sans-serif;
    background: #f2f4f7;
    display: flex;
    justify-content: center;
  }

  .card {
    width: 100%;
    max-width: 480px;
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    padding: 32px;
  }

  h1 {
    margin: 0 0 24px;
    font-size: 26px;
    color: #222;
    text-align: center;
  }

  .progress-section {
    margin-bottom: 20px;
  }

  #progress-text {
    font-size: 13px;
    color: #666;
    margin-bottom: 6px;
    text-align: right;
  }

  .progress-bar-track {
    width: 100%;
    height: 8px;
    background: #eceef2;
    border-radius: 999px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    width: 0%;
    background: #6c8cff;
    border-radius: 999px;
    transition: width 0.2s ease;
  }

  .input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }

  #todo-input {
    flex: 1;
    padding: 12px 14px;
    font-size: 15px;
    border: 1px solid #dcdfe4;
    border-radius: 10px;
    outline: none;
    transition: border-color 0.15s ease;
  }

  #todo-input:focus {
    border-color: #6c8cff;
  }

  #add-btn {
    padding: 12px 18px;
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    background: #6c8cff;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s ease;
    white-space: nowrap;
  }

  #add-btn:hover {
    background: #5578f0;
  }

  #category-select {
    flex-shrink: 0;
    padding: 12px 10px;
    font-size: 14px;
    border: 1px solid #dcdfe4;
    border-radius: 10px;
    outline: none;
    background: #fff;
    color: #333;
    cursor: pointer;
  }

  #char-count {
    font-size: 12px;
    color: #9aa0aa;
    text-align: right;
    margin: -12px 0 16px;
  }

  .filter-bar {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  .filter-btn {
    padding: 6px 12px;
    font-size: 13px;
    border: 1px solid #dcdfe4;
    border-radius: 999px;
    background: #fff;
    color: #666;
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .filter-btn:hover {
    background: #f2f4f7;
  }

  .filter-btn.active {
    background: #6c8cff;
    border-color: #6c8cff;
    color: #fff;
  }

  #empty-message {
    text-align: center;
    color: #9aa0aa;
    padding: 40px 0;
    font-size: 14px;
  }

  ul#todo-list {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  li.todo-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    background: #f8f9fb;
    border: 1px solid #eceef2;
    border-radius: 10px;
  }

  .todo-checkbox {
    flex-shrink: 0;
    width: 18px;
    height: 18px;
    cursor: pointer;
    accent-color: #6c8cff;
  }

  .todo-text {
    flex: 1;
    font-size: 15px;
    color: #333;
    cursor: pointer;
    word-break: break-word;
    padding: 4px 6px;
    border-radius: 6px;
  }

  .todo-text:hover {
    background: #eef1f8;
  }

  .todo-text.completed {
    text-decoration: line-through;
    color: #aab0ba;
  }

  .category-tag {
    flex-shrink: 0;
    font-size: 12px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 999px;
    white-space: nowrap;
  }

  .category-tag.category-personal {
    background: #e3ebff;
    color: #3b5bdb;
  }

  .category-tag.category-study {
    background: #e6f7ee;
    color: #2f9e66;
  }

  .category-tag.category-work {
    background: #fff2e0;
    color: #d9822b;
  }

  .category-tag.category-hobby {
    background: #fde8f3;
    color: #d6336c;
  }

  .todo-edit-input {
    flex: 1;
    padding: 6px 8px;
    font-size: 15px;
    border: 1px solid #6c8cff;
    border-radius: 6px;
    outline: none;
  }

  .todo-category-select {
    flex-shrink: 0;
    padding: 6px 8px;
    font-size: 13px;
    border: 1px solid #6c8cff;
    border-radius: 6px;
    outline: none;
    background: #fff;
    cursor: pointer;
  }

  .save-btn, .delete-btn {
    border: none;
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s ease;
  }

  .save-btn {
    color: #fff;
    background: #4caf7d;
  }

  .save-btn:hover {
    background: #3e9668;
  }

  .delete-btn {
    color: #fff;
    background: #ff6b6b;
  }

  .delete-btn:hover {
    background: #e85555;
  }

  /* narrow-screen layout: stack the input row instead of squeezing 3 controls into one line */
  @media (max-width: 480px) {
    body {
      padding: 20px 12px;
    }

    .card {
      padding: 20px;
      border-radius: 12px;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 18px;
    }

    .input-row {
      flex-wrap: wrap;
    }

    #todo-input {
      flex: 1 1 100%;
    }

    #category-select {
      flex: 1 1 auto;
    }

    #add-btn {
      flex: 1 1 auto;
    }

    .filter-bar {
      gap: 4px;
    }

    .filter-btn {
      padding: 5px 10px;
      font-size: 12px;
    }

    li.todo-item {
      flex-wrap: wrap;
      padding: 10px 12px;
      gap: 8px;
    }

    .todo-edit-input {
      flex: 1 1 100%;
    }
  }
</style>
</head>
<body>

<div class="card">
  <h1>Todo List</h1>

  <div class="progress-section">
    <div id="progress-text">완료 0/0 (0%)</div>
    <div class="progress-bar-track">
      <div id="progress-bar-fill" class="progress-bar-fill"></div>
    </div>
  </div>

  <div class="input-row">
    <input type="text" id="todo-input" placeholder="할 일을 입력하세요" maxlength="200">
    <select id="category-select">
      <option value="개인" selected>개인</option>
      <option value="공부">공부</option>
      <option value="업무">업무</option>
      <option value="취미">취미</option>
    </select>
    <button id="add-btn">추가</button>
  </div>
  <div id="char-count">0 / 200</div>

  <div class="filter-bar" id="filter-bar">
    <button class="filter-btn active" data-filter="전체">전체</button>
    <button class="filter-btn" data-filter="개인">개인</button>
    <button class="filter-btn" data-filter="공부">공부</button>
    <button class="filter-btn" data-filter="업무">업무</button>
    <button class="filter-btn" data-filter="취미">취미</button>
  </div>

  <div id="empty-message" style="display:none;">할 일이 없습니다</div>
  <ul id="todo-list"></ul>
</div>

<script>
  const todos = [];

  const CATEGORIES = ['개인', '공부', '업무', '취미'];
  const CATEGORY_CLASS = { '개인': 'personal', '공부': 'study', '업무': 'work', '취미': 'hobby' };

  const inputEl = document.getElementById('todo-input');
  const categorySelectEl = document.getElementById('category-select');
  const addBtn = document.getElementById('add-btn');
  const listEl = document.getElementById('todo-list');
  const emptyMessageEl = document.getElementById('empty-message');
  const charCountEl = document.getElementById('char-count');
  const filterBarEl = document.getElementById('filter-bar');
  const progressTextEl = document.getElementById('progress-text');
  const progressBarFillEl = document.getElementById('progress-bar-fill');

  const STORAGE_KEY = 'todo-list-data-v1';

  let nextId = 1;
  let currentFilter = '전체';

  // any failure here (missing key, corrupted JSON, wrong shape) must fall back
  // to an empty list rather than throw, so the app always boots successfully
  function loadTodos() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) {
        return [];
      }
      const parsed = JSON.parse(raw);
      if (!Array.isArray(parsed)) {
        return [];
      }
      // drop malformed entries and coerce unknown/missing fields to safe defaults
      return parsed
        .filter(item => item && typeof item === 'object' && typeof item.text === 'string')
        .map((item, index) => ({
          id: typeof item.id === 'number' ? item.id : index + 1,
          text: item.text,
          completed: Boolean(item.completed),
          category: CATEGORIES.includes(item.category) ? item.category : '개인'
        }));
    } catch (e) {
      return [];
    }
  }

  function saveTodos() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
    } catch (e) {
      // storage unavailable (quota exceeded, private mode, etc.) - ignore
    }
  }

  // completed count / percentage shown in the progress bar
  function updateProgress() {
    const total = todos.length;
    const completedCount = todos.filter(t => t.completed).length;
    const percent = total === 0 ? 0 : Math.round((completedCount / total) * 100);
    progressTextEl.textContent = `완료 ${completedCount}/${total} (${percent}%)`;
    progressBarFillEl.style.width = percent + '%';
  }

  function addTodo() {
    const text = inputEl.value.trim();
    if (text === '') {
      return;
    }
    const category = categorySelectEl.value;
    todos.push({ id: nextId++, text: text, completed: false, category: category });
    inputEl.value = '';
    updateCharCount();
    render();
  }

  function deleteTodo(id) {
    const index = todos.findIndex(t => t.id === id);
    if (index !== -1) {
      todos.splice(index, 1);
      render();
    }
  }

  function toggleTodo(id) {
    const todo = todos.find(t => t.id === id);
    if (todo) {
      todo.completed = !todo.completed;
      render();
    }
  }

  function updateTodo(id, newText, newCategory) {
    const trimmed = newText.trim();
    if (trimmed === '') {
      return;
    }
    const todo = todos.find(t => t.id === id);
    if (todo) {
      todo.text = trimmed;
      todo.category = newCategory;
    }
    render();
  }

  function updateCharCount() {
    charCountEl.textContent = inputEl.value.length + ' / 200';
  }

  // single re-render entry point: called after every add/edit/delete/toggle/filter
  // change so the list, progress bar, and localStorage always stay in sync
  function render() {
    listEl.innerHTML = '';

    // sort on a copy so the underlying `todos` order (insertion order) is untouched;
    // incomplete items first, completed items pushed to the bottom
    const sortedTodos = [...todos].sort((a, b) => {
      if (a.completed === b.completed) {
        return 0;
      }
      return a.completed ? 1 : -1;
    });

    const visibleTodos = currentFilter === '전체'
      ? sortedTodos
      : sortedTodos.filter(t => t.category === currentFilter);

    if (visibleTodos.length === 0) {
      emptyMessageEl.style.display = 'block';
    } else {
      emptyMessageEl.style.display = 'none';
    }

    visibleTodos.forEach(todo => {
      const li = document.createElement('li');
      li.className = 'todo-item';

      const checkbox = document.createElement('input');
      checkbox.type = 'checkbox';
      checkbox.className = 'todo-checkbox';
      checkbox.checked = todo.completed;
      checkbox.addEventListener('change', () => toggleTodo(todo.id));

      const categoryTag = document.createElement('span');
      categoryTag.className = 'category-tag category-' + CATEGORY_CLASS[todo.category];
      categoryTag.textContent = todo.category;

      const textSpan = document.createElement('span');
      textSpan.className = 'todo-text' + (todo.completed ? ' completed' : '');
      textSpan.textContent = todo.text;
      textSpan.addEventListener('click', () => enterEditMode(li, todo));

      const deleteBtn = document.createElement('button');
      deleteBtn.className = 'delete-btn';
      deleteBtn.textContent = '삭제';
      deleteBtn.addEventListener('click', () => deleteTodo(todo.id));

      li.appendChild(checkbox);
      li.appendChild(categoryTag);
      li.appendChild(textSpan);
      li.appendChild(deleteBtn);
      listEl.appendChild(li);
    });

    // keep progress display and persisted storage in lockstep with every render
    updateProgress();
    saveTodos();
  }

  function enterEditMode(li, todo) {
    li.innerHTML = '';

    const editInput = document.createElement('input');
    editInput.type = 'text';
    editInput.className = 'todo-edit-input';
    editInput.value = todo.text;
    editInput.maxLength = 200;

    const editCategorySelect = document.createElement('select');
    editCategorySelect.className = 'todo-category-select';
    CATEGORIES.forEach(cat => {
      const option = document.createElement('option');
      option.value = cat;
      option.textContent = cat;
      if (cat === todo.category) {
        option.selected = true;
      }
      editCategorySelect.appendChild(option);
    });

    const saveBtn = document.createElement('button');
    saveBtn.className = 'save-btn';
    saveBtn.textContent = '확인';

    function save() {
      updateTodo(todo.id, editInput.value, editCategorySelect.value);
    }

    saveBtn.addEventListener('click', save);
    editInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        save();
      }
    });

    li.appendChild(editInput);
    li.appendChild(editCategorySelect);
    li.appendChild(saveBtn);
    editInput.focus();
    editInput.select();
  }

  addBtn.addEventListener('click', addTodo);
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      addTodo();
    }
  });
  inputEl.addEventListener('input', updateCharCount);

  filterBarEl.addEventListener('click', (e) => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) {
      return;
    }
    currentFilter = btn.dataset.filter;
    filterBarEl.querySelectorAll('.filter-btn').forEach(b => {
      b.classList.toggle('active', b === btn);
    });
    render();
  });

  // restore any previously saved list on page load, then seed nextId past the
  // highest restored id so newly added items never collide with restored ones
  const restoredTodos = loadTodos();
  todos.push(...restoredTodos);
  if (restoredTodos.length > 0) {
    nextId = Math.max(...restoredTodos.map(t => t.id)) + 1;
  }

  render();
</script>

</body>
</html>
